  "7939f424": "TransferFromFailed()"
  "13be252b": "InsufficientAllowance()"   # pUSD: thrown by transferFrom when allowance < amount
  "f4d678b8": "InsufficientBalance()"     # pUSD: thrown by transferFrom when balance < amount

  # V1 / common:
  "756688fe": "InvalidNonce()"
  "c56873ba": "OrderExpired()"
  "7b38b76e": "OrderFilledOrCancelled()"
  "66f8620a": "InvalidComplement()"

